<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyTots Ultimate</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login" class="section active">

  <h1>🌈 TinyTots Ultimate</h1>

  <input id="kidName" placeholder="Enter Name 👶">

  <button onclick="startApp()">Start 🚀</button>

</div>

<!-- APP -->
<div id="app">

  <div class="topbar">
    <h1>🌈 TinyTots</h1>
    <p id="status">⭐ Stars: 0 | 🏆 Level: 1</p>
  </div>

  <div class="menu">

    <button onclick="showSection('alphabets')">🔤 ABC</button>
    <button onclick="showSection('numbers')">🔢 Numbers</button>
    <button onclick="showSection('animals')">🐶 Animals</button>
    <button onclick="showSection('balloon')">🎈 Game</button>
    <button onclick="showSection('mini')">🎮 Quiz</button>

  </div>

  <!-- ALPHABETS -->
  <div id="alphabets" class="section">
    <h2>A to Z</h2>
    <div id="alphabetBox" class="card-container"></div>
  </div>

  <!-- NUMBERS -->
  <div id="numbers" class="section">
    <h2>1 to 100</h2>
    <div id="numberBox" class="numbers-grid"></div>
  </div>

  <!-- ANIMALS -->
  <div id="animals" class="section">
    <h2>Animals</h2>

    <div class="card-container">

      <div class="animal" onclick="speak('Dog Woof')">🐶 Dog</div>
      <div class="animal" onclick="speak('Cat Meow')">🐱 Cat</div>
      <div class="animal" onclick="speak('Lion Roar')">🦁 Lion</div>
      <div class="animal" onclick="speak('Cow Moo')">🐄 Cow</div>

    </div>

  </div>

  <!-- 🎈 BALLOON GAME -->
  <div id="balloon" class="section">

    <h2>🎈 Pop Balloons</h2>

    <button onclick="startBalloon()">Start Game</button>

    <div id="gameArea"></div>

  </div>

  <!-- 🎮 MINI GAME -->
  <div id="mini" class="section">

    <h2>🎮 Quiz Game</h2>

    <p id="question"></p>

    <button onclick="answer(1)">Apple</button>
    <button onclick="answer(2)">Banana</button>
    <button onclick="answer(3)">Cat</button>

  </div>

</div>

<!-- MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
