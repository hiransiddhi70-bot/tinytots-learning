<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyTots Learning</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login" class="section active">

  <h1>🌈 TinyTots Learning</h1>
  <p>Enter your name 👶</p>

  <input id="kidName" placeholder="Your Name">

  <button onclick="startApp()">Start Learning 🚀</button>

</div>

<!-- MAIN APP -->
<div id="app">

  <div class="topbar">
    <h1>🌈 TinyTots Learning</h1>
  </div>

  <div class="menu">

    <button onclick="showSection('alphabets')">🔤 Alphabets</button>
    <button onclick="showSection('numbers')">🔢 Numbers</button>
    <button onclick="showSection('animals')">🐶 Animals</button>
    <button onclick="showSection('rhymes')">🎵 Rhymes</button>
    <button onclick="showSection('drawing')">🎨 Drawing</button>

  </div>

  <!-- ALPHABETS -->
  <div id="alphabets" class="section">

    <h2>Learn A to Z</h2>

    <div class="card-container" id="alphabetBox"></div>

  </div>

  <!-- NUMBERS -->
  <div id="numbers" class="section">

    <h2>Numbers 1–100</h2>

    <div class="numbers-grid" id="numbersBox"></div>

  </div>

  <!-- ANIMALS -->
  <div id="animals" class="section">

    <h2>Animals & Sounds</h2>

    <div class="card-container">

      <div class="animal-card" onclick="playAnimal('dog')">🐶 Dog</div>
      <div class="animal-card" onclick="playAnimal('cat')">🐱 Cat</div>
      <div class="animal-card" onclick="playAnimal('lion')">🦁 Lion</div>
      <div class="animal-card" onclick="playAnimal('cow')">🐄 Cow</div>
      <div class="animal-card" onclick="playAnimal('duck')">🦆 Duck</div>

    </div>

  </div>

  <!-- RHYMES -->
  <div id="rhymes" class="section">

    <h2>🎵 Nursery Rhymes</h2>

    <div class="reading-box">

      <p onclick="speak('Twinkle Twinkle Little Star')">🌟 Twinkle Twinkle</p>
      <p onclick="speak('Johny Johny Yes Papa')">👶 Johny Johny</p>
      <p onclick="speak('Baa Baa Black Sheep')">🐑 Black Sheep</p>

    </div>

  </div>

  <!-- DRAWING -->
  <div id="drawing" class="section">

    <h2>🎨 Drawing Pad</h2>

    <div class="tools">

      <button onclick="setColor('black')">⚫</button>
      <button onclick="setColor('red')">🔴</button>
      <button onclick="setColor('blue')">🔵</button>
      <button onclick="setColor('green')">🟢</button>

      <button onclick="eraser()">❌ Eraser</button>

      <select onchange="setBrush(this.value)">
        <option value="3">Small</option>
        <option value="6" selected>Medium</option>
        <option value="12">Big</option>
      </select>

    </div>

    <canvas id="canvas"></canvas>

    <button onclick="clearCanvas()">Clear</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
